name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.26"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: booking_test
          POSTGRES_USER: booking
          POSTGRES_PASSWORD: booking
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U booking"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...
        env:
          DATABASE_URL: postgres://booking:booking@localhost:5432/booking_test?sslmode=disable

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        run: CGO_ENABLED=0 go build -o /dev/null ./cmd/booking-svc

  proto-check:
    name: Proto lint & breaking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-action@v1
        with:
          lint: true
          breaking: true
          breaking_against: "${{ github.event.repository.clone_url }}#branch=main"

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -f deployments/docker/Dockerfile -t booking-svc:${{ github.sha }} .

  migrate-check:
    name: Migration check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: booking_migrate
          POSTGRES_USER: booking
          POSTGRES_PASSWORD: booking
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U booking"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install golang-migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.18.3/migrate.linux-amd64.tar.gz | tar xz
          sudo mv migrate /usr/local/bin/

      - name: Migrate up
        run: migrate -path migrations -database "postgres://booking:booking@localhost:5432/booking_migrate?sslmode=disable" up

      - name: Migrate down
        run: migrate -path migrations -database "postgres://booking:booking@localhost:5432/booking_migrate?sslmode=disable" down -all
